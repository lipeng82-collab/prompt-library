name = "湘江研究院周报生成"
description = "每周五10:00自动生成工作周报，遵循6大模块结构和仿宋版格式标准"
trigger = "schedule"
scheduleType = "recurring"
rrule = "FREQ=WEEKLY;BYDAY=FR;BYHOUR=10;BYMINUTE=0"
validFrom = "2026-04-18"
status = "ACTIVE"
# 注意：请修改为同事自己的工作目录路径
cwds = ["{USER_HOME}/WorkBuddy/Claw"]

[prompt]
湘小历周报生成自动化任务（核心执行流程）

## 任务目标
每周五10:00自动生成湘江研究院研究中心工作周报，严格遵循仿宋版格式标准（方正小标宋22pt/黑体16pt/仿宋16pt/行距28磅/首行缩进2字符）和6大模块结构。

## 执行步骤

步骤一：读取本周日记
确定本周日期范围（周一至周四）和上周五日期，读取 {USER_HOME}/WorkBuddy/Claw/.workbuddy/memory/YYYY-MM-DD.md（本周所有工作日记）。若本周无日记，注明"暂无工作日记记录"。

步骤二：工作分类与核心成果识别
按5类分类整理：课题研究（含政策研究、规划编制、咨询服务）、客户对接（含外部调研、商务洽谈）、内部工作（含行政、管理、培训）、政策动态（含政策追踪、专报撰写）、个人思考（含工作反思、建议）。识别"核心成果"优先展示，每类最多提取3项核心成果。

步骤三：生成6大模块周报（仿宋版格式）
严格遵循以下结构生成周报：

【第X周】研究中心工作周报
填报日期：____年____月____日（第__周，__月__日—__月__日）
填报人：_______________
审签：_______________

一、本周主要工作完成情况
（表格：序号/工作事项/完成状态/成果说明/责任人）
本周核心成果（1-3项，成果导向，数据量化）

二、下周工作计划
（表格：序号/计划事项/预计完成时间/备注）

三、需协调或支持事项
（表格：事项/类型[资源/审批/协同/信息]/优先级/协调对象/建议解决方案）

四、风险提示与工作思考

五、指标追踪（按月填，月报时汇总）
（表格：指标名称/本月目标/本周完成/完成率/预计完成时间）

六、附：重要信息摘要（本周重要政策/市场动态，1-3条）

填写规范三原则：
1. 成果导向：优先呈现已完成事项的核心成果，而非过程描述
2. 数据支撑：关键数据需量化（金额/数量/进度%/参与人数等）
3. 问题导向：需支持事项须说明背景、诉求与建议方案

步骤四：保存周报文件
文件名：湘江研究院研究中心_周报_{YYYY-Www}.md
保存路径：{USER_HOME}/WorkBuddy/Claw/
生成后展示草稿等待用户确认。

步骤五：企微 Webhook 推送（可选）
如需推送，请配置Webhook地址
推送格式：Markdown卡片，包含周次、主要成果、下周计划、需协调事项。

步骤六：WorkBuddy通知推送
通过WorkBuddy系统通知接口告知用户周报已生成，通知内容含文件名+核心摘要+文件路径。

## 注意事项
- 若本周无日记：周报各模块填写"暂无工作日记记录，本周未进行工作记录"
- 格式标准：标题方正小标宋22pt居中、一级标题黑体16pt、正文仿宋16pt、行距28磅固定值
- 生成后必须展示草稿，等待用户确认后再推送
